name: CI Checks Backend

on:
  pull_request:
    branches: 
      - main
      - production
    paths:
      - 'src/backend/**'

jobs:
  lint-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: cd src/backend && uv sync

      - name: Run linter API
        run: cd src/backend && uv run ruff check api/

      - name: Run linter Agent
        run: cd src/backend && uv run ruff check agent/

      - name: Run linter Pacer
        run: cd src/backend && uv run ruff check pacer/

      - name: Run linter scripts
        run: cd src/backend && uv run ruff check scripts/



      # add tests
