services:
  # Multi-worker API service (handles HTTP requests)
  trainaabackend:
    image: trainaabackend:latest
    container_name: trainaabackend
    env_file:
      - .env.development
    environment:
      - RUN_SCHEDULER=false  # Scheduler disabled in API workers
    command: ["/backend/.venv/bin/uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1", "--log-config", "logging_config.yaml"]
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/backend/logs
    restart: unless-stopped

  # Single-worker scheduler service (runs background jobs)
  trainaascheduler:
    image: trainaabackend:latest
    container_name: trainaascheduler
    env_file:
      - .env.staging
    environment:
      - RUN_SCHEDULER=true  # Scheduler enabled in this service
    command: ["/backend/.venv/bin/uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8001", "--workers", "1", "--log-config", "logging_config.yaml"]
    ports:
      - "8001:8001"  # Different port to avoid conflicts (not exposed externally)
    volumes:
      - ./logs:/backend/logs
    restart: unless-stopped

  # Redis service for temporary data storage (PKCE verifiers, caching)
  redis:
    image: redis:7-alpine
    container_name: trainaaredis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"  # Internal only, not exposed via nginx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:latest
    container_name: trainaabackend-nginx
    volumes:
      - ./nginx.staging.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - trainaabackend
    restart: unless-stopped

volumes:
  redis-data: