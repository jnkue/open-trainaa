version: 1
disable_existing_loggers: False

formatters:
  default:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  
  access:
    "()": uvicorn.logging.AccessFormatter
    format: '%(asctime)s - %(name)s - %(levelname)s - %(client_addr)s - "%(request_line)s" %(status_code)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
    use_colors: False
  
  console_default:
    "()": uvicorn.logging.DefaultFormatter
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  
  console_access:
    "()": uvicorn.logging.AccessFormatter
    format: '%(asctime)s - %(name)s - %(levelname)s - %(client_addr)s - "%(request_line)s" %(status_code)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

handlers:
  default:
    formatter: default
    class: logging.handlers.RotatingFileHandler
    filename: logs/pacer-fastapi.log
    maxBytes: 104857600  # 100MB
    backupCount: 10
    encoding: utf8
  
  access:
    formatter: access
    class: logging.handlers.RotatingFileHandler
    filename: logs/pacer-fastapi.log
    maxBytes: 104857600  # 100MB
    backupCount: 10
    encoding: utf8
  
  console:
    formatter: console_default
    class: logging.StreamHandler
    stream: ext://sys.stdout

loggers:
  uvicorn.error:
    level: INFO
    handlers: [default, console]
    propagate: no
  
  uvicorn.access:
    level: INFO
    handlers: [access]
    propagate: no
  
  pacer-fastapi:
    level: DEBUG
    handlers: [default, console]
    propagate: no

root:
  level: INFO
  handlers: [default, console]